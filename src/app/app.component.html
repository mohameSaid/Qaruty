@if (auth.isAuthenticated()) {
  <div class="app-shell">
    <mat-toolbar color="primary" class="app-toolbar">
      <mat-icon class="brand-icon">groups</mat-icon>
      <span class="brand-title">قريتي - كفر أبو الحسن</span>
      <span class="spacer"></span>
      <button
        mat-icon-button
        [matTooltip]="theme.mode() === 'dark' ? 'التبديل إلى الوضع الفاتح' : 'التبديل إلى الوضع الداكن'"
        (click)="theme.toggle()"
      >
        <mat-icon>{{ theme.mode() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
      <button mat-icon-button matTooltip="تسجيل الخروج ({{ auth.username() }})" (click)="logout()">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <div class="app-body">
      <nav class="nav-rail">
        <a class="rail-item" routerLink="/users" routerLinkActive="active">
          <mat-icon>groups</mat-icon>
          <span>المستخدمون</span>
        </a>
        <a class="rail-item" routerLink="/competitions" routerLinkActive="active">
          <mat-icon>emoji_events</mat-icon>
          <span>المسابقات</span>
        </a>
      </nav>

      <main class="app-content">
        <router-outlet />
      </main>
    </div>
  </div>
} @else {
  <router-outlet />
}
