@if (auth.isAuthenticated()) {
  <div class="app-shell">
    <mat-toolbar color="primary" class="app-toolbar">
      <mat-icon class="brand-icon">groups</mat-icon>
      <span class="brand-title">賯乇賷鬲賷 - 賰賮乇 兀亘賵 丕賱丨爻賳</span>
      <span class="spacer"></span>
      <h1 class="quran-text">鈥忣 鈥忣尭鈥忣拵 鈥忣尭鈥忣偗鈥忣埜鈥忣 鈥忣尭鈥忣偗鈥忣埜鈥忣亝鈥忣噣鈥忣嫢</h1>
      <span class="spacer"></span>
      <button
        mat-icon-button
        [matTooltip]="theme.mode() === 'dark' ? '丕賱鬲亘丿賷賱 廿賱賶 丕賱賵囟毓 丕賱賮丕鬲丨' : '丕賱鬲亘丿賷賱 廿賱賶 丕賱賵囟毓 丕賱丿丕賰賳'"
        (click)="theme.toggle()"
      >
        <mat-icon>{{ theme.mode() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
      </button>
      <button mat-icon-button matTooltip="鬲爻噩賷賱 丕賱禺乇賵噩 ({{ auth.username() }})" (click)="logout()">
        <mat-icon>logout</mat-icon>
      </button>
    </mat-toolbar>

    <div class="app-body">
      <nav class="nav-rail">
        <a class="rail-item" routerLink="/users" routerLinkActive="active">
          <mat-icon>groups</mat-icon>
          <span>丕賱賲爻鬲禺丿賲賵賳</span>
        </a>
      </nav>

      <main class="app-content">
        <router-outlet />
      </main>
    </div>
  </div>
} @else {
  <router-outlet />
}
